<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>The Elect — Section heading</title>
<style>
 :root{ --bg:#f4ecd6;--text:#2b2620;--text-dim:#6b6256;--gold:#876811;--red:#8b1a1a;
   --red-dim:#d8b3a2;--border:#d8c8a4;
   --font-mono:'Courier New','Lucida Console','DejaVu Sans Mono',monospace; }
 *{box-sizing:border-box;margin:0;padding:0}
 body{background:var(--bg);color:var(--text);font-family:var(--font-mono);padding:2.5rem 2rem;line-height:1.6}
 .section-heading{display:flex;align-items:center;gap:1.5rem;font-size:.78rem;letter-spacing:.2em;color:var(--gold);margin-bottom:.75rem;text-transform:uppercase}
 .heading-rule{flex:1;height:1px;background:var(--border)}
 .section-sub{font-size:.85rem;color:var(--text-dim);margin-bottom:2.5rem;text-align:center}
 .withheld-header{display:flex;align-items:center;gap:1.25rem;margin-bottom:1rem}
 .withheld-rule{flex:1;height:1px;background:var(--red-dim)}
 .withheld-label{font-size:.72rem;letter-spacing:.2em;color:#a02620;text-transform:uppercase}
</style></head><body>
 <div class="section-heading"><span>The Roll Call</span><span class="heading-rule"></span></div>
 <p class="section-sub">Fourteen voices, summoned and made runnable.</p>

 <div class="withheld-header"><span class="withheld-label">Withheld</span><span class="withheld-rule"></span></div>
 <p class="section-sub" style="text-align:left">Studied as registers; weights not shipped &mdash; rights, estate, or copyright keep these off local iron.</p>
</body></html>
